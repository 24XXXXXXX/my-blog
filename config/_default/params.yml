    zh-CN: 本文最后更新于 {time}，请注意文中内容可能已不适用。
    zh-TW: 本文最後更新於 {time}，請注意文中內容可能已不適用。
    ja: この記事は最終更新日：{time}。記載内容が現在有効でない可能性がありますのでご注意ください。
    pt-BR: Este artigo foi atualizado pela última vez em {time}. Observe que o conteúdo pode não ser mais aplicável.

# ICP 备案
icp:
  icpnumber: # ICP备案号
  beian: # 网安备案号
  recordcode: # 网安备案链接中的recordcode参数

# 萌国 ICP 备案
moe_icp:
  icpnumber: # 萌国ICP备案号

# 赞助
sponsor:
  enable: false
  tip: 
    zh-CN: 请作者喝杯咖啡吧
    zh-TW: 請作者喝杯咖啡吧
    en: Buy me a coffee
    ja: コーヒーを買ってください
    pt-BR: Compre-me um café
  icon:
    url: "../images/taichi.png" # 图片路径相对于 css/main.css，因此需要向上一级到 images 目录
    rotate: true
    mask: true # 是否将图片作为 mask
  qr:
    # - name: 支付宝
    #   src: "sponsor/alipay.jpg"
    # - name: 微信
    #   src: "sponsor/wechat.png"

# 分享
share:
  # - facebook（Facebook）
  # - twitter（Twitter）
  # - linkedin（LinkedIn）
  # - reddit（Reddit）
  # - weibo（微博）
  # - qq（QQ）
  # - weixin（微信）

# 是否在首页显示分类卡片
home_categories:
  enable: false
  content:
    - categories: # 字符串（单层分类）或数组（多层分类）
      cover: # 留空表示随机封面
    - categories:
      cover:

########################################
# 实验性功能
########################################

# 实验性功能，可能有较多 bug，请谨慎开启！
pjax:
  enable: true

# 实验性功能
# https://github.com/GoogleChromeLabs/quicklink
quicklink:
  enable: false
  # `requestIdleCallback` 超时时间（毫秒）
  timeout: 3000
  # 是否将 options.el 容器内的 URL 视为高优先级
  # 为 true 时，如果支持会优先使用 fetch()（而非 link[rel=prefetch]）
  priority: true
  # 判断某个 URL 是否需要预取（prefetch）
  # 仅支持字符串
  ignores: []

# 实验性功能
service_worker:
  enable: false

# 实验性功能
live2d:
  enable: false
  position: left # left 或 right

# 实验性功能
live2d_widgets:
  enable: false
  position: left # left 或 right

# https://github.com/CodeByZach/pace
pace:
  enable: true

# 实验性功能
# 请开启 pjax 后再使用此功能
player:
  position: before_sidebar # before_sidebar | after_sidebar | after_widget
  # 如果启用 meting，必须先启用 aplayer
  aplayer:
    # https://github.com/DIYgod/APlayer
    enable: true
    options:
      audio: []
      fixed: false
      autoplay: false
      loop: all
      order: random
      preload: auto
      volume: 0.7
      mutex: true
      listFolded: true
      lrcType: 0
  meting:
    # https://github.com/metowolf/MetingJS
    # 如需使用 meting，请先启用 aplayer
    enable: true
    meting_api: https://api.injahow.cn/meting/?server=:server&type=:type&id=:id&auth=:auth&r=:r # 自定义 API
    options:
      id: 17855988794
      server: netease
      type: playlist
      auto:

########################################
# pangu.js
########################################

pangu:
  # 更多信息：https://github.com/vinta/pangu.js
  enable: false  # 启用 pangu.js，在中英文之间自动插入空格

########################################
