  # 更多信息：https://github.com/2061360308/material-theme
  # 注意：启用后，所有封面会自动添加 "crossorigin" 属性以支持动态配色
  # 请确保自定义封面不会被浏览器的 CORS 策略拦截
  enable: false # 启用 material_theme，根据 banner 图片生成动态配色

internal_theme:
