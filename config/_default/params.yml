########################################
# 基础配置
########################################

# 主菜单导航
# 更多图标信息请访问 https://github.com/D-Sketon/hexo-theme-reimu/issues/30
menu:
  - name: home
    url: ""
    icon: # 默认使用太极图标，你可以使用 fontawesome 或 icon_font 的十六进制编码，例如 'f0c1'
  - name: archives
    url: "archives"
    icon:
  - name: about
    url: "about"
    icon:
  - name: friend
    url: "friend"
    icon:

mainSections: ["post"]
# 年，月，日及时间的格式化样式
# 年、月、日及时间的格式化样式
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: JJX
email: jjx_00001@2925.com
description: "天行健，君子以自强不息。"
subtitle: "路漫漫其修远兮，吾将上下而求索。"

banner: "images/banner.png"
# 也可以写成下面这种 URL 形式
# banner: "https://example.com"

# 如需使用 srcset 属性，请启用
banner_srcset:
  enable: true
  srcset:
    - src: "images/banner-600w.png"
      media: "(max-width: 479px)"
    - src: "images/banner-800w.png"
      media: "(max-width: 799px)"
    - src: "images/banner.png"
      media: "(min-width: 800px)"
avatar: "p1.jpg"

# 控制文章封面显示
# 未设置时默认显示 banner 图片
# 优先级低于 Front-matter 中的 cover
cover: # https://example.com / false / rgb(255,117,117)

# 控制文章目录（TOC）显示
# 优先级低于 Front-matter 中的 toc
toc: true

# Open Graph（社交分享卡片）
open_graph:
  enable: true
  options:
    # twitter_card（Twitter 卡片类型）: <twitter:card>
    # twitter_id（Twitter 作者）: <twitter:creator>
    # twitter_site（Twitter 站点）: <twitter:site>
    # twitter_image（Twitter 分享图）: <twitter:image>
    # google_plus（Google+ 个人页）: <g+:profile_link>
    # fb_admins（Facebook 管理员 ID）: <fb:admin_id>
    # fb_app_id（Facebook 应用 ID）: <fb:app_id>

# 内容
excerpt_link: Read More

# 注入代码片段
# 请确保你的代码片段为 safeHTML
injector:
  head_begin: '<meta name="algolia-site-verification" content="92AD1D70E990F67D" /> <meta name="algolia-site-verification"  content="5EABE4FBC4C735FB" />' # Algolia 域名验证
  head_end: # 在 </head> 前注入代码片段
  body_begin: # 在 <body> 后注入代码片段
  body_end: # 在 </body> 前注入代码片段
  sidebar_begin: # 在 <aside> 后注入代码片段
  sidebar_end: # 在 </aside> 前注入代码片段

# 页脚版权
# 在页脚版权区域注入代码片段
# 请确保你的代码片段为 safeHTML
copyright:
# 不确定选哪种许可证？可参考：
# https://creativecommons.org/choose/
# https://choosealicense.com/
# copyright: |-
#   <div style="flex-direction:column;align-items: center;"><a rel="license" href="http://creativecommons.org/licenses/by/4.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by/4.0/88x31.png" /></a>
#   本站内容采用 <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a> 许可协议</div>

footer:
  since: 2025 # 例如 2020-当前年份
  powered: true
  count: true
  busuanzi: true
  icon:
    url: "../images/taichi.png" # 该路径相对于 css/main.css，因此需要向上一级到 images 目录
    rotate: true
    mask: true # 是否将图片作为 mask

# 侧边栏位置
sidebar: left

social:
  # 邮箱: mailto:xxx@gmail.com
  # GitHub: https://github.com/yourname
  # Google: https://plus.google.com/yourname
  # Twitter: https://twitter.com/yourname
  # Facebook: https://www.facebook.com/yourname
  # Instagram: https://www.instagram.com/yourname
  # LinkedIn: https://www.linkedin.com/in/yourname
  # Pinterest: https://www.pinterest.com/yourname
  # YouTube: https://www.youtube.com/channel/yourname
  # Vimeo: https://vimeo.com/yourname
  # Flickr: https://www.flickr.com/photos/yourname
  # Dribbble: https://dribbble.com/yourname
  # Behance: https://www.behance.net/yourname
  # Bilibili: https://space.bilibili.com/yourname
  # 微博: https://weibo.com/yourname
  # 知乎: https://www.zhihu.com/people/yourname
  # Reddit: https://www.reddit.com/user/yourname
  # Tumblr: https://yourname.tumblr.com
  # Medium: https://medium.com/@yourname
  # DeviantArt: https://yourname.deviantart.com
  # StackOverflow: https://stackoverflow.com/users/yourname
  # Keybase: https://keybase.io/yourname
  # Telegram: https://t.me/yourname
  # Discord: https://discordapp.com/users/yourname
  # Steam: https://steamcommunity.com/id/yourname

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

# 小组件行为
category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

# 归档行为
only_show_capsule_in_index: false # 如果标签/分类数量非常多，可设为 true，仅在首页显示胶囊组件以提升性能

show_update_time: false # 如果要显示更新时间，请设为 true

# 摘要内容
summary:
  enable: false
  style: 'subtitle' # 可选：'subtitle' 或 'blockquote'

# RSS 输出
rss:
  limit: 10             # 输出最近文章数量，-1 表示输出全部
  showFullContent: false # 输出全文还是摘要
  showCopyright: false   # 为 true 时在文章末尾追加版权信息

# 排序配置
# 可选值：default、date、date-reverse、weight、weight-reverse
# default：Hugo 默认页面集合排序，参见 https://gohugo.io/quick-reference/page-collections/#sort
# date：按日期升序（最早优先）
# date-reverse：按日期降序（最新优先）
# weight：按 weight 升序
# weight-reverse：按 weight 降序
sort_order:
  taxonomy:
    category: date-reverse # 由 categories_weight 控制
    tag: date-reverse # 由 tags_weight 控制
  archive: date-reverse # 由 weight 控制
  home: default # 由 weight 控制

########################################
# 样式（CSS）
########################################

anchor_icon: # 默认使用 '#' 图标，可使用 fontawesome 或 icon_font 的十六进制编码（例如 'f0c1'），也可以设为 false 隐藏锚点图标

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png  # 该路径相对于 css/main.css，因此需要向上一级到 images 目录
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_4k4bc36ef96

# 字体加载策略
# 自定义字体 -> Google Fonts -> 本地回退字体

# 自定义字体
custom_font:
  enable: false
  article:
    # - css: https://fontsapi.zeoseven.com/292/main/result.css # 字体 CSS
    #   name: LXGW WenKai # 字体名称
  code:

# https://fonts.google.com/
# Google Fonts，优先级高于 local_font
font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:
    # - Ubuntu Mono
    # - Source Code Pro
    # - JetBrains Mono

# 本地回退字体
local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  # true：默认启用深色模式
  # false：默认禁用深色模式
  # auto：根据系统设置自动切换
  enable: true # 可选：true | false | auto

########################################
# 统计分析
########################################

baidu_analytics: false
google_analytics: false
clarity: false

########################################
# Markdown 渲染
########################################

# mermaid 地址 https://github.com/mermaid-js/mermaid
mermaid:
  zoom: false # 是否启用 mermaid 图表缩放

code_block:
  # 是否默认展开代码块
  # true：默认展开所有代码块
  # false：默认折叠所有代码块
  # number：当行数超过指定值时默认折叠
  expand: true

math:
  katex:
    enable: true
  mathjax:
    enable: false
    options: # 参见 https://docs.mathjax.org/en/latest/web/configuration.html
    # 配置需要放在数组里，因为 Hugo 会自动把 key 转成小写
      [
        {
          tex:
            {
              tags: "ams",
              useLabelIds: true,
              inlineMath: [["$", "$"], ['\\(', '\\)']],
              displayMath: [["$$", "$$"], ['\\[', '\\]']],
              processEscapes: true,
              processEnvironments: true,
              autoload: { color: [], colorv2: ["color"] },
              packages: { "[+]": ["noerrors"] },
            },
          options:
            {
              skipHtmlTags:
                ["script", "noscript", "style", "textarea", "pre", "code"],
              ignoreHtmlClass: "tex2jax_ignore",
              processHtmlClass: "tex2jax_process",
            },
          loader: { load: ["input/asciimath", "[tex]/noerrors"] },
        },
      ]

########################################
# 评论系统
########################################

# 评论系统全局控制
# 你可以同时启用多个评论系统
# 加载顺序：localStorage（用户手动选择） -> default
# -> valine -> waline -> twikoo -> gitalk -> giscus
comment:
  # 评论区标题
  title:
    en: Leave a comment
    zh-CN: 说些什么吧！
    zh-TW: 說些什麼吧！
    ja: コメントを残す
    pt-BR: Deixe um comentário
  default: waline # 启用多个评论系统时的默认评论系统

# Valine 评论系统 https://valine.js.org
# 版本 1.5.1
# notify 和 verify 已废弃
valine:
  enable: false # 如果要启用 valine，请将此值设为 true
  appId: # leancloud 应用 appId
  appKey: # leancloud 应用 appKey
  pageSize: 10 # 评论列表分页大小
  avatar: mp # gravatar 风格 https://valine.js.org/#/avatar
  # lang: zh-cn # 已废弃，请使用 html.lang
  placeholder: Just go go # 评论输入框占位提示（例如：Please leave your footprints）
  guest_info: nick,mail,link # 评论区头部信息
  recordIP: true # 是否记录评论者 IP
  highlight: true # 是否高亮代码块
  visitor: false # 是否显示访客数
  serverURLs: # leancloud server URL

# https://waline.js.org/
waline:
  enable: false
  serverURL:
  # lang: zh-CN # 已废弃，请使用 html.lang
  locale: {} # https://waline.js.org/guide/features/i18n.html#%E8%87%AA%E5%AE%9A%E4%B9%89%E8%AF%AD%E8%A8%80
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

# https://twikoo.js.org
twikoo:
  enable: false
  envId: # 腾讯云环境填 envId；Vercel 环境填地址（https://xxx.vercel.app）
  region:

# https://github.com/gitalk/gitalk/blob/master/readme-cn.md
gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

# https://giscus.app/zh-CN
giscus:
  enable: false
  repo:
  repoId:
  category:
  categoryId:
  mapping: mapping
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  # commentTheme: preferred_color_scheme 无效
  # lang: zh-CN # 已废弃，请使用 html.lang

########################################
# 搜索
########################################

algolia_search:
  enable: true
  appID: "E1OYFOTZVD"
  apiKey: "25917ee1c2b58ae7936356c3612be43b"
  indexName: "my-blog"
  hits:
    per_page: 10

########################################
# 动画
########################################

preloader:
  enable: true
  text: 
    zh-CN: 加载中...
    zh-TW: 加載中...
    en: Loading...
    ja: 加载中...
    pt-BR: Carregando...
  icon: # 默认使用内联 SVG 以提升速度，也可以使用图片 URL，例如 '/images/taichi.png'
  rotate: true # 是否旋转图标

# 参见 https://github.com/D-Sketon/aos.js
animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

# 参见 https://github.com/D-Sketon/mouse-firework
firework:
  enable: true
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["var(--red-1)", "var(--red-2)", "var(--red-3)", "var(--red-4)"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["var(--red-0)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

